name: CI

on:
  push:
    branches: [main, dev]
    tags-ignore: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install virtual display (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libdbus-1-3 \
            xvfb x11-utils libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libxcb-shape0 libxcb-cursor0

      - name: Install package and test dependencies
        run: |
          pip install -e ".[occ]" pytest pytest-qt || pip install -e . pytest pytest-qt

      - name: Run tests (Linux headless)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run -a pytest tests/ -v

      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      actions: write
    steps:
      # Checkout the gh-pages branch — that's where the Jekyll source lives
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  docs-deploy:
    name: Deploy Documentation
    needs: docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
